# Duro Library Validations Configuration
#
# This file defines all validations that will be synced to your Duro library.
# Each validation entry controls:
#   - name: The unique identifier for the validation
#   - description: Human-readable description of what the validation does
#   - version: Semantic version number for tracking changes
#   - isActive: Whether the validation is enabled in your library
#   - onFailure: How to handle validation failures (error or warning)
#   - path: Path to the JavaScript file containing the validation code
#
# The sync process will:
#   1. Create or update all validations defined here
#   2. Set any validations that exist in the API but not in this file to isActive: false
#   3. Never delete validations from your library

validations:
  # Example validation that checks for test phrases (WARNING mode)
  - name: "Warn: Test Phrase"
    description: "Warns when 'test' appears in change order name or description"
    version: "1.0.0"
    isActive: true
    onFailure: warning
    path: validations/warn-test-phrase.js

  # Validation that checks for revision sequence jumps
  - name: "Revision Sequence Check"
    description: "Warns when proposed revisions skip numbers (e.g., jumping from revision 1 to 3)"
    version: "1.0.0"
    isActive: true
    onFailure: warning
    path: validations/revision-sequence-check.js

  # AI Summary validation that provides external analysis
  - name: "AI Summary"
    description: "Provides an AI-generated summary of the change order via external service (informational only)"
    version: "1.0.0"
    isActive: false
    onFailure: warning
    path: validations/ai-summary.js

  # Capacitor Design Status Check
  - name: "Capacitor Design Status Check"
    description: "Blocks change orders containing capacitors in Design status"
    version: "1.0.0"
    isActive: false
    onFailure: error
    path: validations/capacitor-design-check.js

  # Capacitors are bad validation
  - name: "capacitors are bad"
    description: "Blocks all change orders containing any capacitor components"
    version: "1.0.0"
    isActive: false
    onFailure: error
    path: validations/capacitors-are-bad.js

  # Auto Failure
  - name: "the failure option"
    description: 'failure is always an option'
    version: "1.0.0"
    isActive: true
    onFailure: error
    path: validations/description-fail.js

  # Battery Recall Block
  - name: "Block: Battery Recall"
    description: "Blocks change orders containing battery components due to active recall from Acme Battery Co."
    version: "1.0.0"
    isActive: true
    onFailure: error
    path: validations/battery-recall-block.js

  # Capacitor Recall Block
  - name: "Block: Capacitor Recall"
    description: "Blocks change orders containing capacitor components due to active recall from Acme Co Resistor Corp."
    version: "1.0.0"
    isActive: true
    onFailure: error
    path: validations/capacitor-recall-block.js

  # Template for adding new validations:
  # - name: "validation-name"
  #   description: "What this validation checks"
  #   version: "1.0.0"
  #   isActive: true
  #   onFailure: error    # or warning
  #   path: validations/your-validation.js
